# Build spec AWS Amplify — frontend em SIGEO/ (Vite + React).
# Usa npm install --legacy-peer-deps para evitar conflito com npm ci e múltiplos package.json no repo.
# Root directory no console: VAZIO (build na raiz do repo, comandos usam cd SIGEO).
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
        - nvm install 20
        - nvm use 20
        - node -v
        - cd SIGEO && npm install --legacy-peer-deps
    build:
      commands:
        - cd SIGEO && npm run build
        - ls -la SIGEO/dist
  artifacts:
    baseDirectory: SIGEO/dist
    files:
      - '**/*'
  cache:
    paths:
      - SIGEO/node_modules/**/*
  customHeaders:
    - pattern: '**'
      headers:
        - key: 'Cache-Control'
          value: 'no-cache, no-store, must-revalidate'
        - key: 'X-Frame-Options'
          value: 'SAMEORIGIN'
