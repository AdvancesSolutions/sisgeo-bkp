# CI mínimo: build do frontend SIGEO (sem RDS / migrações).
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-web:
    name: Build SIGEO Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SIGEO/package-lock.json
      - name: Install & build
        run: |
          cd SIGEO
          npm ci
          npm run build
