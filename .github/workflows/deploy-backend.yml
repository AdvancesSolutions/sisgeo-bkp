# Deploy do Backend (API) para AWS: migrações → build Docker → ECR → ECS
# Dispara em todo push na main. Frontend é deployado pelo Amplify (amplify.yml).
name: Deploy Backend (Migrations + ECS)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'sa-east-1' }}

jobs:
  migrate:
    name: Migrações RDS
    runs-on: ubuntu-latest
    outputs:
      done: ${{ steps.migrate.outcome }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get DB password from SSM
        id: db
        run: |
          PASSWORD=$(aws ssm get-parameter \
            --name "${{ secrets.SSM_DB_PASSWORD_PARAM }}" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
            --region ${{ env.AWS_REGION }})
          echo "DB_PASSWORD=$PASSWORD" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @sigeo/shared build

      - name: Run migrations
        id: migrate
        env:
          NODE_ENV: production
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT || '5432' }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: pnpm --filter @sigeo/api run db:migrate

      - name: Run bootstrap (admin/local/area padrão)
        env:
          NODE_ENV: production
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT || '5432' }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: pnpm --filter @sigeo/api run db:bootstrap
        continue-on-error: true

  build-and-deploy:
    name: Build & Deploy ECS
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build API image
        run: |
          docker build -f apps/api/Dockerfile \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%MZ) \
            -t ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPO }}:latest ./

      - name: Push to ECR
        run: |
          docker push ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPO }}:latest

      - name: Deploy to ECS (force new deployment)
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.CLUSTER_NAME }} \
            --service ${{ secrets.SERVICE_NAME }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
